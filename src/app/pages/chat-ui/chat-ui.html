<section class="chat-ui-page">
  <header class="chat-ui-page__header">
    <h2 class="chat-ui-page__title">{{ 'chatUi.title' | translate }}</h2>
    <p class="chat-ui-page__subtitle">{{ 'chatUi.subtitle' | translate }}</p>
  </header>
  <section class="chat-ui-page__panel">
    <p class="chat-ui-page__hint">{{ 'chatUi.hint' | translate }}</p>
    <div class="chat-ui-page__chat-shell">
      <ejs-chatui
        #chatUi
        id="enterprise-chat-ui"
        cssClass="e-chat-ui chat-ui-page__widget"
        [user]="currentUser"
        [messages]="initialMessages"
        [headerText]="contactUser.user ?? ''"
        [placeholder]="'chatUi.placeholder' | translate"
        [suggestions]="suggestions"
        [width]="chatWidth"
        [height]="chatHeight"
        [showTimeBreak]="true"
        [showTimeStamp]="true"
        [autoScrollToBottom]="true"
        [enableRtl]="isRtl()"
        (messageSend)="onMessageSend($event)"
      ></ejs-chatui>
    </div>
    <p class="chat-ui-page__tip">{{ 'chatUi.tip' | translate }}</p>
  </section>
</section>
