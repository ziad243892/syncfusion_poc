<section class="home-page">
  <header class="home-page__header">
    <h2 class="home-page__title">{{ 'home.welcome' | translate }}</h2>
    <p class="home-page__subtitle">{{ 'home.description' | translate }}</p>
  </header>
  <div class="home-page__stats">
    @for (stat of stats; track stat.labelKey) {
      <article class="home-page__stat-card">
        <p class="home-page__stat-label">{{ stat.labelKey | translate }}</p>
        <p class="home-page__stat-value">{{ stat.value }}</p>
      </article>
    }
  </div>
  <section class="home-page__overview">
    <h3 class="home-page__overview-title">{{ 'home.gridOverview' | translate }}</h3>
    <p class="home-page__overview-subtitle">{{ 'home.gridOverviewDescription' | translate }}</p>
    <app-grid-overview />
  </section>
</section>
